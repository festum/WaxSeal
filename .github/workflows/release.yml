name: Release

# Fires when a version tag is pushed. `gh release create vX.Y.Z` (which creates
# and pushes the tag) is enough to trigger this; the jobs below attach the
# binaries and publish the image. VERSION strips the leading `v` so it matches
# the image tag and the -X main.version stamp (v1.2.3 -> 1.2.3).
on:
  push:
    tags:
      - 'v*'

jobs:
  # Build the version-stamped Linux and macOS binaries and attach them, plus a
  # SHA256SUMS manifest, to the release for the tag. The release is created with
  # generated notes if it does not exist yet; an existing release (for example
  # one created by hand with written notes) keeps its body and just gains the
  # assets. The binaries embed the committed JS bundle but need a system Chromium
  # at runtime.
  binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build release binaries
        run: make release VERSION="${GITHUB_REF_NAME#v}"
      - name: checksums
        working-directory: dist
        run: sha256sum waxseal-* > SHA256SUMS.txt && cat SHA256SUMS.txt
      - name: publish binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" \
            --generate-notes --verify-tag || true
          gh release upload "$GITHUB_REF_NAME" \
            dist/waxseal-* dist/SHA256SUMS.txt --clobber

  # Build and push the runtime image (VERSION and latest) to GHCR with the
  # built-in token. This does not reuse `make docker-push`: that target's login
  # and scope checks are written for a human's gh OAuth token, which the Actions
  # GITHUB_TOKEN is not. `make docker-build` has no such checks. Single platform
  # (linux/amd64), matching the manual release; add buildx for multi-arch later.
  image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: log in to GHCR
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
        run: echo "$GH_TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin
      - name: build and push
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          make docker-build VERSION="$VERSION"
          docker push "ghcr.io/colespringer/waxseal:$VERSION"
          docker push "ghcr.io/colespringer/waxseal:latest"

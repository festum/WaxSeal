name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Build, vet, and run the offline race tests, plus the real-Chromium CDP
  # pipe-transport tests (-tags live) against a pinned browser. The committed
  # browser bundle removes the Node dependency. Only the network YouTube and
  # BotGuard e2e (-tags e2e) still run manually, needing network access.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...
      # Real-Chromium CDP live tests. Install Chrome explicitly so a browser is
      # guaranteed present, not incidental to the ubuntu-latest image. The stable
      # channel floats. It tracks current Chrome by design (matching what BotGuard
      # sees in production), so a new stable release can legitimately move these
      # tests. Pin a version here if deterministic CI matters more. The
      # WAXSEAL_REQUIRE_CHROME hook makes a missing browser fail loudly instead of
      # skipping. The tests drive a local Chromium over the pipe transport and need
      # no network.
      - id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: CDP live tests (real Chromium, pipe transport)
        env:
          WAXSEAL_CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
          WAXSEAL_REQUIRE_CHROME: "1"
        run: go test -race -tags live ./internal/cdp

  # Build and vet the nested WaxTap adapter module separately.
  provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - working-directory: provider
        run: go build ./... && go vet ./...

  # Cross-compile the pure Go CLI and daemon. Each binary drives an external
  # Chromium at runtime.
  cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build ${{ matrix.goos }}/${{ matrix.goarch }} (no CGo)
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./cmd/waxseal

  # Rebuild the committed browser bundle and require a byte-for-byte match.
  reproduce-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: rebuild and diff against the committed bundle
        run: make verify-assets

  # Build the container image. Running it requires Chromium and network access.
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f compose.yaml build

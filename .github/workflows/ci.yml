name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Offline build + vet + race tests. No Node toolchain: the browser bundle is
  # committed (go:embed). Live YouTube/BotGuard tests are run manually, not in CI
  # (they need a real Chromium + network and are inherently flaky).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./...

  # The WaxTap adapter is a separate nested module; build and vet it separately
  # so WaxTap-specific changes do not block the core package checks.
  provider:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - working-directory: provider
        run: go build ./... && go vet ./...

  # Cross-compile the CLI/daemon for the full GOOS/GOARCH matrix. The binary is
  # pure Go and cross-compiles cleanly; it drives an external Chromium at runtime.
  cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: build ${{ matrix.goos }}/${{ matrix.goarch }} (no CGo)
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build ./cmd/waxseal

  # Reproducibility gate: rebuild the committed browser bundle from source and
  # fail if a single byte differs from what is committed.
  reproduce-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: rebuild and diff against the committed bundle
        run: make verify-assets

  # The container build gate: builds the hardened image. It is not run here
  # (running needs a real Chromium + network).
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose -f compose.yaml build

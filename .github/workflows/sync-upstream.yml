name: Sync Upstream

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/ColeSpringer/WaxSeal.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream/main
        run: |
          git merge upstream/main \
            --no-edit \
            --strategy-option=ours \
            -m "chore: sync upstream ColeSpringer/WaxSeal"

      - name: Fix upstream import paths (colespringer → festum)
        run: |
          # Replace any lingering upstream module paths introduced by the merge
          find . -name "*.go" -not -path "./.git/*" \
            -exec grep -l "github.com/colespringer/waxseal" {} \; \
            | xargs -r sed -i 's|github.com/colespringer/waxseal|github.com/festum/waxseal|g'
          # Also fix go.mod / go.sum in subdirectories (e.g. provider/)
          find . -name "go.mod" -not -path "./.git/*" \
            -exec sed -i 's|github.com/colespringer/waxseal|github.com/festum/waxseal|g' {} \;
          if ! git diff --quiet; then
            git add -A
            git commit -m "fix: rewrite upstream import paths colespringer→festum after sync"
          fi

      - name: Push to fork
        run: git push origin main

# Standalone WaxSeal PO-token service. Run with `docker compose up --build`.
#
# Extends the shared service in compose.base.yaml and publishes the daemon's
# port. Security settings and the read-only, resource-limit, and multi-tenant
# options live in that base file. To run the daemon next to a consumer on a
# shared egress IP, use compose.full.yaml.
services:
  waxseal:
    extends:
      file: compose.base.yaml
      service: waxseal
    ports:
      - "127.0.0.1:4416:4416" # loopback only; use "0.0.0.0:4416:4416" or a LAN IP to expose
